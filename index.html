<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ôn Tập Trắc Nghiệm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }
    .container {
      width: 100%;
      max-width: 760px;
    }
    .app-title {
      text-align: center;
      margin-bottom: 24px;
    }
    .app-title h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 4px;
    }
    .app-title p {
      color: #718096;
      font-size: 0.95rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
      padding: 32px;
    }
    /* ---- Setup Screen ---- */
    .setup-form label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #4a5568;
      margin-bottom: 6px;
      margin-top: 20px;
    }
    .setup-form label:first-child { margin-top: 0; }
    .setup-form select,
    .setup-form input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      color: #1a202c;
      background: #f8fafc;
      transition: border-color .2s;
      outline: none;
    }
    .setup-form select:focus,
    .setup-form input[type="number"]:focus {
      border-color: #4f46e5;
      background: #fff;
    }
    .range-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .range-row .field { flex: 1; }
    .badge {
      display: inline-block;
      background: #eef2ff;
      color: #4f46e5;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
    }
    .btn-primary {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .2s, transform .1s;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ---- Quiz Screen ---- */
    #screen-quiz { display: none; }
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .quiz-counter {
      font-weight: 700;
      color: #4f46e5;
      font-size: 1rem;
    }
    .btn-back {
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: #4a5568;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .2s, color .2s;
    }
    .btn-back:hover { border-color: #4f46e5; color: #4f46e5; }
    .progress-bar-wrap {
      background: #e2e8f0;
      border-radius: 99px;
      height: 8px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease;
    }
    .question-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a202c;
      line-height: 1.65;
      margin-bottom: 20px;
    }
    .question-id-tag {
      display: inline-block;
      background: #f0fdf4;
      color: #16a34a;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.78rem;
      font-weight: 700;
      margin-right: 8px;
      vertical-align: middle;
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }
    .option-btn {
      width: 100%;
      text-align: left;
      padding: 14px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 0.97rem;
      color: #1a202c;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      line-height: 1.5;
      transition: border-color .15s, background .15s, transform .1s;
    }
    .option-btn:hover:not(:disabled) {
      border-color: #4f46e5;
      background: #eef2ff;
      transform: translateX(3px);
    }
    .option-btn:disabled { cursor: default; transform: none; }
    .option-btn.correct {
      border-color: #16a34a;
      background: #f0fdf4;
      color: #15803d;
      font-weight: 700;
    }
    .option-btn.wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #b91c1c;
      font-weight: 700;
    }
    .feedback-text {
      min-height: 28px;
      font-size: 0.97rem;
      font-weight: 600;
      margin-bottom: 18px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .feedback-text.correct { background: #f0fdf4; color: #15803d; display: block; }
    .feedback-text.wrong   { background: #fef2f2; color: #b91c1c; display: block; }
    .nav-row {
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }
    .btn-nav {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .2s, transform .1s;
    }
    .btn-nav:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-nav:active:not(:disabled) { transform: translateY(0); }
    .btn-nav:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn-prev { background: #e2e8f0; color: #4a5568; }
    .btn-next { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; }

    @media (max-width: 500px) {
      .card { padding: 20px 16px; }
      .app-title h1 { font-size: 1.35rem; }
      .question-text { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="app-title">
    <h1>📚 Ôn Tập Trắc Nghiệm</h1>
    <p>Chọn môn học và phân đoạn câu hỏi để bắt đầu</p>
  </div>

  <!-- SCREEN 1: Setup -->
  <div class="card" id="screen-setup">
    <div class="setup-form">
      <label for="subject-select">Môn học</label>
      <select id="subject-select"></select>

      <label>Phân đoạn câu hỏi <span class="badge" id="total-badge">0 câu</span></label>
      <div class="range-row">
        <div class="field">
          <label for="from-q" style="margin-top:0">Từ câu</label>
          <input type="number" id="from-q" min="1" value="1" />
        </div>
        <div class="field">
          <label for="to-q" style="margin-top:0">Đến câu</label>
          <input type="number" id="to-q" min="1" value="50" />
        </div>
      </div>

      <button class="btn-primary" id="btn-start">🚀 Bắt đầu ôn tập</button>
    </div>
  </div>

  <!-- SCREEN 2: Quiz -->
  <div class="card" id="screen-quiz">
    <div class="quiz-header">
      <span class="quiz-counter" id="quiz-counter">Câu hỏi 1 / 50</span>
      <button class="btn-back" id="btn-back">↩ Chọn lại môn/phân đoạn</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="options-list" id="options-list"></div>
    <div class="feedback-text" id="feedback-text"></div>
    <div class="nav-row">
      <button class="btn-nav btn-prev" id="btn-prev">⬅️ Câu trước</button>
      <button class="btn-nav btn-next" id="btn-next">Câu tiếp theo ➡️</button>
    </div>
  </div>
</div>

<script>
const SUBJECTS_DATA = { tmdt: [{"id":1,"cau_hoi":"Các yếu tố ảnh hưởng đến tốc độ trang web KHÔNG bao gồm","options":["A. Yêu cầu của khách hàng","B. Số lượng người dùng đồng thời trong thời gian cao điểm","C. Yêu cầu bảo mật","D. Giá cả sản phẩm"],"dap_an_dung":"D"},{"id":2,"cau_hoi":"Các chi phí nào KHÔNG phải chi phí liên quan đến việc xây dựng ứng dụng thương mại điện tử. Phương tiện nào sau đây không phải là phương tiện được sử dụng trong thương mại điện tử","options":["A. Chi phí xây dựng website","B. Chi phí đầu tư, thuê máy chủ","C. Chi phí thiết kế nội dung quảng cáo","D. Chi phí đăng ký thương hiệu"],"dap_an_dung":"D"},{"id":3,"cau_hoi":"Để thiết lập các thông tin hiển thị về nội dung sản phẩm, giá, khuyến mại... trên một Website Thương mại điện tử thì cần sử dụng tài khoản gì?","options":["A. Tài khoản khách hàng","B. Tài khoản của cục quản lý Thương mại điện tử","C. Tài khoản của ngân hàng","D. Tài khoản quản trị (Admin) website"],"dap_an_dung":"D"},{"id":4,"cau_hoi":"Đâu không phải chức năng cần phải có của phần mềm máy chủ thương mại điện tử?","options":["A. Danh mục sản phẩm","B. Giỏ hàng điện tử","C. Thanh toán trực tuyến","D. Thông tin thị trường"],"dap_an_dung":"D"},{"id":5,"cau_hoi":"Trong phân tích SWOT, doanh nghiệp cần phải mô tả","options":["A. Điểm mạnh, điểm yếu, cơ hội, thách thức","B. Điểm mạnh, điểm yếu, thuận lợi, khó khăn","C. Lợi ích, hạn chế, cơ hội, thách thức","D. Không ý nào đúng"],"dap_an_dung":"A"},{"id":6,"cau_hoi":"Nhiệm vụ nào KHÔNG có trong các bước xây dựng ứng dụng Thương mại điện tử theo cách tiếp cận hệ thống?","options":["A. Phân tích hệ thống","B. Chuyển đổi hệ thống","C. Xây dựng hệ thống","D. Thiết kế hệ thống"],"dap_an_dung":"B"},{"id":7,"cau_hoi":"Doanh nghiệp thuê ngoài dịch vụ lưu trữ Website có ưu điểm gì?","options":["A. Dịch vụ chuyên nghiệp","B. Tiết kiệm chi phí hơn","C. Không phải quan tâm nhiều tới vấn đề kỹ thuật vận hành máy chủ Web","D. Tất cả các phương án còn đều đúng"],"dap_an_dung":"D"},{"id":8,"cau_hoi":"Phần giao diện tương tác với người dùng trên website được gọi là gì?","options":["A. Interface","B. FrontEnd","C. BackEnd","D. View"],"dap_an_dung":"B"},{"id":9,"cau_hoi":"Giỏ mua hàng điện tử KHÔNG nhất thiết phải có chức năng nào dưới đây?","options":["A. Tính toán giá, lập hóa đơn","B. Tìm kiếm sản phẩm","C. Lựa chọn, thêm, bớt sản phẩm","D. Liên kết đến phần mềm thanh toán điện tử"],"dap_an_dung":"B"},{"id":10,"cau_hoi":"Apache và IIS (Internet Information Services) là những tên gọi của","options":["A. Máy chủ Web (Web Server)","B. Phần mềm máy chủ Web","C. Thiết bị bảo mật trên Internet","D. Loại hình dịch vụ trên Internet"],"dap_an_dung":"B"},{"id":11,"cau_hoi":"Vòng đời phát triển hệ thống thương mại điện tử gồm những bước nào?","options":["A. Phân tích hệ thống, Thiết kế hệ thống, Xây dựng hệ thống, Kiểm tra, Thực hiện","B. Lập kế hoạch, Phân tích hệ thống, Thiết kế hệ thống, Xây dựng hệ thống, Kiểm tra","C. Phân tích hệ thống, Thiết kế hệ thống, Xây dựng hệ thống, Kiểm tra, Bảo trì","D. Lập kế hoạch, Phân tích hệ thống, Xây dựng hệ thống, Kiểm tra, Thực hiện"],"dap_an_dung":"A"},{"id":12,"cau_hoi":"Đâu không phải là công cụ tạo website thương mại điện tử?","options":["A. Magento","B. WooCommerce","C. nopCommerce","D. Hadoop"],"dap_an_dung":"D"},{"id":13,"cau_hoi":"Quản trị chương trình ưu đãi về giá trong website bán hàng B2C thường quản trị về","options":["A. Chương trình tiện ích cho bán hàng","B. Mẫu mã sản phẩm","C. Nhóm khách hàng","D. Chương trình khuyến mãi, mã giảm giá"],"dap_an_dung":"D"},{"id":14,"cau_hoi":"Một CMS của website bán hàng B2C thường phải có các chức năng quản trị cơ bản sau","options":["A. Sản phẩm, danh mục sản phẩm, đơn hàng, khách hàng","B. Sản phẩm, giá, địa điểm, nhân sự","C. Ngân sách, nhân sự, khách hàng","D. Sản phẩm, các chương trình marketing, lương cán bộ"],"dap_an_dung":"A"},{"id":15,"cau_hoi":"Chỉ ra yếu tố quan trọng nhất đối với một website?","options":["A. Mua tên miền và dịch vụ hosting","B. Tổ chức các nội dung website","C. Thiết kế website","D. Bảo trì và cập nhật thông tin"],"dap_an_dung":"D"},{"id":16,"cau_hoi":"Xây dựng và khởi động website bán lẻ gồm các bước","options":["A. Thuê thiết kế, đăng bài, quản trị","B. Lập kế hoạch; Triển khai tổ chức các hoạt động như: thu thập và tìm kiếm thông tin, khai thác, xử lý thông tin và các yếu tố bên ngoài, chọn mô hình phù hợp; Xây dựng website; Duy trì và phát triển website.","C. Mua website theo mẫu có sẵn, dùng thử nghiệm, sửa đổi, đăng bài, bán hàng","D. Sử dụng website giới thiệu về doanh nghiệp, bổ sung các chức năng đăng bài về các sản phẩm, dịch vụ"],"dap_an_dung":"B"},{"id":17,"cau_hoi":"Đâu KHÔNG phải lợi ích của một CRM","options":["A. Cung cấp cho khách hàng các dịch vụ tốt hơn, nâng cao hiệu quả của trung tâm hỗ trợ khách hàng","B. Trợ giúp nhân viên bán hàng thực hiện đơn hàng một cách nhanh nhất, đơn giản hóa tiến trình tiếp thị và bán hàng","C. Quản lý tồn kho và hỗ trợ giải quyết các vấn đề vận chuyển","D. Phát hiện các khách hàng mới, tăng doanh thu từ khách hàng"],"dap_an_dung":"C"},{"id":18,"cau_hoi":"Trong các website B2C cần phải có các chức năng nào sau đây để quản trị bán lẻ điện tử được hiệu quả","options":["A. Quản lý: mặt hàng, đơn hàng, khách hàng, chiến dịch khuyến mãi/giảm giá, kết nối nhà vận chuyển, kết nối dịch vụ thanh toán","B. Quản lý: nhân sự, chấm công, lương thưởng của nhân viên","C. Quản lý: danh mục hàng hóa, hệ thống kho","D. Quản lý danh sách khách hàng, đối tác cung ứng sản phẩm/dịch vụ"],"dap_an_dung":"A"},{"id":19,"cau_hoi":"Trong quản trị website B2C, thông tin khách hàng cho việc quản lý đơn hàng, quản lý quan hệ khách hàng được lấy","options":["A. Khi khách hàng nhập thông tin để mua hàng hoặc do nhân viên của doanh nghiệp bán hàng cập nhật đơn hàng","B. Khi thực hiện các chiến dịch marketing","C. Khi thực hiện các cuộc khảo sát về chất lượng hàng hóa/dịch vụ","D. Khi khách hàng tham gia các sự kiện giới thiệu sản phẩm do doanh nghiệp tổ chức"],"dap_an_dung":"A"},{"id":20,"cau_ nh1.gif.exe"],"dap_an_dung":"D"},{"id":566,"cau_hoi":"Các nhà sản xuất, như Dell, Nike, Lego, Godiva và Sony bán hàng trực tuyến trực tiếp từ các website công ty đến các khách hàng cá nhân. Đây là mô hình bán lẻ điện tử","options":["A. Mô hình nhà bán lẻ theo đơn đặt hàng qua thư tín chuyển sang trực tuyến","B. Mô hình bán hàng trực tiếp từ các nhà sản xuất","C. Nhà bán lẻ điện tử thuần túy.","D. Nhà bán lẻ hỗn hợp"],"dap_an_dung":"B"},{"id":567,"cau_hoi":"Chứng thư số là gì?","options":["A. Là thông điệp dữ liệu do tổ chức cung cấp dịch vụ chứng thực chữ ký điện tử phát hành nhằm xác nhận tổ chức, cá nhân được chứng thực là người ký chữ ký điện tử.","B. Là thông tin đi kèm theo dữ liệu (văn bản, hình ảnh, video...) nhằm mục đích xác định người chủ của dữ liệu đó","C. Là một dạng chứng thư điện tử có sử dụng hệ mật mã bất đối xứng","D. Là một dạng chứng thư điện tử từ số có sử dụng hệ mật mã đối xứng"],"dap_an_dung":"C"},{"id":568,"cau_hoi":"Tập tin Cookies là","options":["A. Một file tạm được tự động tạo ra trong máy tính cá nhân, mỗi khi người dùng truy cập một trang web nào đó, nó sẽ lưu những thông tin liên quan đến cá nhân như tài khoản đăng nhập để sử dụng cho lần sau.","B. Sử dụng các mạng xã hội và cộng đồng trực tuyến như Facebook, Twitter, Pinterest và Instagram để thu thập thông dữ liệu người dùng","C. Những thông tin về người dùng web như: hành vi, thói quen, những website họ ghé thăm, thông tin họ tìm kiếm,... được ghi lại bởi phần mềm trên máy chủ web","D. Thông tin người dùng web được thu thập thông qua các cuộc khảo sát online về chất lượng của sản phẩm, dịch vụ"],"dap_an_dung":"A"},{"id":569,"cau_hoi":"Quá trình “mở phong bì số” trong giao dịch điện tử sử dụng chữ ký số thì cần sử dụng khóa nào?","options":["A. Khóa công khai của người nhận","B. Khóa bí mật của người nhận","C. Khóa công khai của người gửi","D. Khóa bí mật của người gửi"],"dap_an_dung":"B"},{"id":570,"cau_hoi":"Đâu không phải là yêu cầu của chữ ký số","options":["A. Xác thực chủ thể","B. Tránh giả mạo chủ thể","C. Kiểm soát thay đổi văn bản sau khi ký","D. Chữ ký số giống nhau trên các văn bản ký khác nhau"],"dap_an_dung":"D"},{"id":571,"cau_hoi":"Chỉ ra mệnh đề không đúng?","options":["A. Hợp đồng B2B linh hoạt hơn hợp đồng B2C","B. Hợp đồng điện tử phụ thuộc vào máy tính và các phần mềm lập và hiển thị nó","C. Người mua trong hợp đồng điện tử nhiều khi không thể nhận được hàng","D. Hợp đồng điện tử được kí giữa người và phần mềm máy tính"],"dap_an_dung":"C"},{"id":572,"cau_hoi":"Quảng cáo trực tuyến News Feed là","options":["A. Là dạng quảng cáo được thể hiện dưới dạng một cửa sổ mới bật lên khi người sử dụng bắt đầu mở một trang web.","B. Là dạng quảng cáo được thể hiện theo cách các ảnh tĩnh (jpg, png, gif) hoặc ảnh động (tạo bằng Flash) được hiển thị trong các khung của trang web khác","C. Là một loại quảng cáo đa phương tiện xuất hiện chồng lên nội dung của trang web được yêu cầu và có thể biến mất sau một khoảng thời gian được đặt trước","D. Là dạng quảng cáo mà nội dung nằm trong cột chính giữa trung tâm của trang chủ Facebook, là một danh sách cập nhật liên tục, những tin tức từ Bạn bè và các Trang bạn đang follow Facebook."],"dap_an_dung":"D"},{"id":573,"cau_hoi":"Khi thực hiện thanh toán các hóa đơn tiền điện, điện thoại, internet bằng cách vào các website của những nhà cung cấp dịch vụ trên và nhập vào đó thông tin tài khoản để thanh toán, đây là hình thức thanh toán điện tử gì?","options":["A. Cổng thanh toán hóa đơn trực tuyến - bill consolidator","B. Thanh toán hóa đơn trực tuyến - biller direct","C. Thẻ tín dụng ảo - virtual credit card","D. Ngân hàng điện tử - online banking"],"dap_an_dung":"B"},{"id":574,"cau_hoi":"Khẳng định nào sau đây sai?","options":["A. Chuyển giao hàng hóa là hoạt động không thể được thực hiện bằng phương tiện điện tử","B. Các chủ thể trong TMĐT không nhất thiết phải biết nhau","C. Zalo là dịch vụ thông tin có thể được sử dụng để thực hiện hoạt động TMĐT","D. Hoạt động TMĐT tiềm ẩn nhiều rủi ro hơn thương mại truyền thống"],"dap_an_dung":"A"},{"id":575,"cau_hoi":"Giao thức HTTPS là giao thức truyền thông được sử dụng để?","options":["A. Truyền siêu văn bản (HyperText)","B. Truy cập dịch vụ thông tin WWW (World Wide Web)","C. Truyền siêu văn bản (HyperText) có sử dụng kỹ thuật bảo mật thông tin","D. Truyền tệp tin trên Internet có sử dụng kỹ thuật an toàn thông tin"],"dap_an_dung":"C"},{"id":576,"cau_hoi":"TCP/IP được viết tắt từ:","options":["A. Transmission Control Protocol/ Internet Protocol","B. Transmission Control Panel/ Internet Protocol.","C. Transaction Control Prototype/ Internet Prototype.","D. Transmission Control Protocol/ Internet Prototype."],"dap_an_dung":"A"},{"id":577,"cau_hoi":"Đâu KHÔNG phải là yêu cầu thiết kế website B2C:","options":["A. Cung cấp đầy đủ tiện ích đặt hàng, tiện ích thanh toán trực tuyến","B. Giao diện đẹp, thiết kế chuyên nghiệp, phép hiển thị trên di động","C. Có nhiều thông tin về các bản tin thời sự trong ngày.","D. Liên kết bán hàng tối đa qua các mạng xã hội"],"dap_an_dung":"C"},{"id":578,"cau_hoi":"Trong phân tích SWOT, doanh nghiệp cần phải mô tả:","options":["A. Điểm mạnh, điểm yếu, cơ hội, thách thức","B. Điểm mạnh, điểm yếu, thuận lợi, khó khăn","C. Lợi ích, hạn chế, cơ hội, thách thức","D. Không ý nào đúng"],"dap_an_dung":"A"},{"id":579,"cau_hoi":"Hoạt động nào không thể thực hiện được bằng các phương tiện điện tử?","options":["A. Thương lượng","B. Giao hàng","C. Đặt hàng","D. Thanh toán"],"dap_an_dung":"B"},{"id":580,"cau_hoi":"Hợp đồng điện tử là hợp đồng được giao kết thông qua các phương tiện điện tử, trong đó hợp đồng hoặc một phần của hợp đồng được thiết lập dưới dạng thông điệp điện tử. Đây là khái niệm hợp đồng điện tử trong:","options":["A. Luật giao dịch thương mại điện tử của Việt nam","B. Luật mẫu về thương mại điện tử Uncitral","C. Nhóm nghiên cứu thuộc uỷ ban châu âu về hợp đồng trong TMĐT","D. OECD"],"dap_an_dung":"A"},{"id":581,"cau_hoi":"Đâu là chiến lược marketing dựa trên sản phẩm","options":["A. Doanh nghiệp tập trung vào việc xây dựng sản phẩm và thương hiệu: xem xét cả tính năng của sản phẩm lẫn nhu cầu cơ bản của khách hàng tiềm năng, xây dựng chuỗi sản phẩm theo chủ đề, sắp xếp trưng bày các sản phẩm theo nhóm hay quy trình sản xuất","B. Doanh nghiệp coi khách hàng là trung gian, phân chia khách hàng thành từng nhóm có cùng đặc điểm, ưu tiên việc giao tiếp và đáp ứng nhu cầu của khách hàng.","C. Doanh nghiệp coi việc giảm giá thành sản phẩm là trung tâm, tính toán tổng của tất cả các chi phí tài chính mà khách hàng trả tiền (bao gồm cả chi phí giao dịch) để có được sản phẩm là ít nhất","D. Doanh nghiệp coi việc xây dựng các địa điểm lưu trữ, phân phối sản phẩm là trung tâm, các sản phẩm hoặc dịch vụ có sẵn tại nhiều địa điểm khác nhau, đồng thời sản phẩm phải có mặt đúng địa điểm và ở thời điểm tốt nhất để bán chúng."],"dap_an_dung":"A"},{"id":582,"cau_hoi":"URL là gì?","options":["A. Địa chỉ trên Word Wide Web","B. Một hình vẽ trên World Wide Web","C. Tập hợp các phím bấm trên bàn phím","D. Một phần trên màn hình máy tính"],"dap_an_dung":"A"},{"id":583,"cau_hoi":"Tiếp thị trực tuyến qua email (Email Marketing) là","options":["A. Là một cách doanh nghiệp tiếp thị trên các công cụ tìm kiếm. Đây là một quá trình doanh nghiệp thu hút các lượt truy cập miễn phí và có xếp hạng vị trí cao trên các trang kết quả của công cụ tìm kiếm bằng cách trả tiền cho các quảng cáo của doanh nghiệp.","B. Là hình thức thực hiện các hoạt động marketing trên mạng internet thông qua việc sử dụng các kênh mạng xã hội (social media) nhằm mục đích xây dựng thương hiệu và quảng bá sản phẩm hoặc dịch vụ","C. Là quá trình sử dụng email để gửi thông điệp tiếp thị trực tiếp tới mọi người nhằm nỗ lực giành được khách hàng mới và giữ chân những khách hàng hiện tại","D. Là hình thức tiếp thị mà các nhà quảng cáo trả tiền để hiển thị quảng cáo của họ trên các công cụ tìm kiếm và các nền tảng trực tuyến khác, chẳng hạn như Facebook, YouTube, LinkedIn và Instagram."],"dap_an_dung":"C"},{"id": // ─── SUBJECTS CONFIG ────────────────────────────────────────
const SUBJECTS = {
  tmdt:        { name: 'Internet & Thương mại điện tử', data: SUBJECTS_DATA.tmdt },
  qdtc:        { name: 'Quản trị dữ liệu tài chính',   data: SUBJECTS_DATA.qdtc },
  laptrinhweb: { name: 'Lập trình Web',                 data: SUBJECTS_DATA.laptrinhweb }
};

// ─── STATE ──────────────────────────────────────────────────
let currentSlice = [];
let currentIndex = 0;
let answers = {}; // { localIndex: { chosen: 'B', correct: 'B', locked: true } }

// ─── DOM REFS ───────────────────────────────────────────────
const subjectSelect = document.getElementById('subject-select');
const totalBadge    = document.getElementById('total-badge');
const fromQ         = document.getElementById('from-q');
const toQ           = document.getElementById('to-q');
const btnStart      = document.getElementById('btn-start');
const screenSetup   = document.getElementById('screen-setup');
const screenQuiz    = document.getElementById('screen-quiz');
const quizCounter   = document.getElementById('quiz-counter');
const progressFill  = document.getElementById('progress-fill');
const questionText  = document.getElementById('question-text');
const optionsList   = document.getElementById('options-list');
const feedbackText  = document.getElementById('feedback-text');
const btnPrev       = document.getElementById('btn-prev');
const btnNext       = document.getElementById('btn-next');
const btnBack       = document.getElementById('btn-back');

// ─── INIT SELECT ────────────────────────────────────────────
function initSelect() {
  Object.entries(SUBJECTS).forEach(([key, val]) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = val.name;
    subjectSelect.appendChild(opt);
  });
  updateBadge();
}

function updateBadge() {
  const key = subjectSelect.value;
  const total = SUBJECTS[key]?.data?.length ?? 0;
  totalBadge.textContent = `${total} câu`;
  fromQ.max = total || 1;
  toQ.max   = total || 1;
  if (total > 0) {
    fromQ.value = 1;
    toQ.value   = Math.min(50, total);
  }
}

subjectSelect.addEventListener('change', updateBadge);

// ─── START ──────────────────────────────────────────────────
btnStart.addEventListener('click', () => {
  const key = subjectSelect.value;
  const subjectData = SUBJECTS[key]?.data ?? [];

  if (!subjectData.length) {
    alert('Chưa có dữ liệu cho môn này. Vui lòng bổ sung sau.');
    return;
  }

  let from = parseInt(fromQ.value, 10) || 1;
  let to   = parseInt(toQ.value,   10) || subjectData.length;
  from = Math.max(1, Math.min(from, subjectData.length));
  to   = Math.max(from, Math.min(to, subjectData.length));

  // Slice by position (1-indexed)
  currentSlice = subjectData.slice(from - 1, to);
  currentIndex = 0;
  answers = {};

  screenSetup.style.display = 'none';
  screenQuiz.style.display  = 'block';
  renderQuestion();
});

// ─── BACK ───────────────────────────────────────────────────
btnBack.addEventListener('click', () => {
  screenQuiz.style.display  = 'none';
  screenSetup.style.display = 'block';
});

// ─── RENDER QUESTION ────────────────────────────────────────
function renderQuestion() {
  const total = currentSlice.length;
  const q     = currentSlice[currentIndex];

  // Counter & progress
  quizCounter.textContent = `Câu hỏi ${currentIndex + 1} / ${total}`;
  progressFill.style.width = `${((currentIndex + 1) / total) * 100}%`;

  // Question text
  questionText.innerHTML = `<span class="question-id-tag">Câu ${q.id}</span>${escapeHtml(q.cau_hoi)}`;

  // Options
  optionsList.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;

    const saved = answers[currentIndex];
    if (saved) {
      // Restore state
      btn.disabled = true;
      const letter = opt.trim().charAt(0); // 'A', 'B', 'C', 'D'
      if (letter === saved.correct) btn.classList.add('correct');
      else if (letter === saved.chosen && saved.chosen !== saved.correct) btn.classList.add('wrong');
    } else {
      btn.addEventListener('click', () => handleAnswer(opt, q.dap_an_dung));
    }
    optionsList.appendChild(btn);
  });

  // Feedback
  const saved = answers[currentIndex];
  if (saved) {
    showFeedback(saved.chosen, saved.correct);
  } else {
    feedbackText.className = 'feedback-text';
    feedbackText.textContent = '';
  }

  // Nav buttons
  btnPrev.disabled = currentIndex === 0;
  btnNext.textContent = currentIndex === total - 1 ? '🏁 Kết thúc' : 'Câu tiếp theo ➡️';
}

// ─── HANDLE ANSWER ──────────────────────────────────────────
function handleAnswer(chosenOpt, correctLetter) {
  const chosenLetter = chosenOpt.trim().charAt(0);

  // Save state
  answers[currentIndex] = { chosen: chosenLetter, correct: correctLetter };

  // Disable all & color
  const btns = optionsList.querySelectorAll('.option-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const letter = btn.textContent.trim().charAt(0);
    if (letter === correctLetter) btn.classList.add('correct');
    else if (letter === chosenLetter) btn.classList.add('wrong');
  });

  showFeedback(chosenLetter, correctLetter);
}

function showFeedback(chosen, correct) {
  feedbackText.className = 'feedback-text';
  if (chosen === correct) {
    feedbackText.classList.add('correct');
    feedbackText.textContent = '✅ Chính xác luôn! 🎉';
  } else {
    feedbackText.classList.add('wrong');
    feedbackText.textContent = `❌ Chưa đúng rồi! Đáp án đúng là: ${correct}`;
  }
}

// ─── NAVIGATION ─────────────────────────────────────────────
btnPrev.addEventListener('click', () => {
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
});

btnNext.addEventListener('click', () => {
  if (currentIndex < currentSlice.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    // End of quiz
    const correct = Object.values(answers).filter(a => a.chosen === a.correct).length;
    const answered = Object.keys(answers).length;
    alert(`🏁 Hoàn thành!\n\nĐã trả lời: ${answered}/${currentSlice.length} câu\nĐúng: ${correct} câu\nSai: ${answered - correct} câu\n\nChúc mừng bạn đã hoàn thành phân đoạn này!`);
  }
});

// ─── HELPERS ────────────────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── BOOT ───────────────────────────────────────────────────
initSelect();
</script>
